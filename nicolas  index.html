<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenguajes de Programación</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Nunito', sans-serif;
    background:#fdf6ec;
    color:#2b2b2b;
    min-height:100vh;
    padding:50px 6vw;
  }
  h1{
    font-family:'Fredoka', sans-serif;
    text-align:center;
    font-size:clamp(1.8rem, 4vw, 2.6rem);
    color:#2b2b2b;
  }
  h1 span{
    color:#ff6b4a;
  }
  p.sub{
    text-align:center;
    color:#6b6b6b;
    margin:12px 0 40px;
  }
  .list{
    max-width:640px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .row{
    display:flex;
    align-items:center;
    gap:18px;
    background:#fff;
    border-radius:14px;
    padding:16px 20px;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }
  .row:hover{
    transform:translateX(6px);
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
  }
  .row .badge{
    width:46px;
    height:46px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    flex-shrink:0;
    color:#fff;
  }
  .row .info{flex:1;}
  .row h3{
    font-family:'Fredoka', sans-serif;
    font-size:1.05rem;
  }
  .row p{
    font-size:0.85rem;
    color:#7a7a7a;
    margin-top:2px;
  }
  .row .year{
    font-size:0.8rem;
    color:#b0b0b0;
    font-weight:600;
  }
  .details{
    max-width:640px;
    margin:6px auto 0;
    font-size:0.85rem;
    color:#555;
    background:#fff8f0;
    border-left:4px solid #ff6b4a;
    padding:10px 16px;
    border-radius:8px;
    display:none;
  }
  .row.open + .details{display:block;}
</style>
</head>
<body>
<h1>Lenguajes de <span>Programación</span></h1>
<p class="sub">Haz clic en cada uno para ver un dato rápido</p>
<div class="list" id="list"></div>
<script>
const langs = [
  {name:"Python", year:1991, icon:"🐍", color:"#3776ab", tag:"Simple y versátil", fact:"Creado por Guido van Rossum, hoy es líder en inteligencia artificial."},
  {name:"JavaScript", year:1995, icon:"⚡", color:"#e8a13b", tag:"El idioma de la web", fact:"Corre en todos los navegadores y también en servidores con Node.js."},
  {name:"Java", year:1995, icon:"☕", color:"#b23a2e", tag:"Estable y robusto", fact:"Muy usado en bancos, apps Android y sistemas empresariales."},
  {name:"C++", year:1985, icon:"⚙️", color:"#5b6ee1", tag:"Alto rendimiento", fact:"Motor de videojuegos, editores y software que necesita velocidad."},
  {name:"Ruby", year:1995, icon:"💎", color:"#a83279", tag:"Elegante y feliz", fact:"Famoso por el framework Ruby on Rails para crear webs rápido."},
  {name:"Go", year:2009, icon:"🐹", color:"#00acd7", tag:"Simple y veloz", fact:"Creado por Google para manejar miles de tareas a la vez."},
];
const list = document.getElementById("list");
langs.forEach(l => {
  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `
    <div class="badge" style="background:${l.color}">${l.icon}</div>
    <div class="info">
      <h3>${l.name}</h3>
      <p>${l.tag}</p>
    </div>
    <div class="year">${l.year}</div>
  `;
  const details = document.createElement("div");
  details.className = "details";
  details.textContent = l.fact;
 row.addEventListener("click", () => row.classList.toggle("open"));
  list.appendChild(row);
  list.appendChild(details);
});
</script>
</body>
</html>
