<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenguajes de Programación</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter', sans-serif;
    background:linear-gradient(160deg, #1b1030, #2a1245 60%, #3a1650);
    min-height:100vh;
    color:#fff;
    padding:60px 6vw;
  }
  h1{
    font-family:'Poppins', sans-serif;
    text-align:center;
    font-size:clamp(1.8rem, 4vw, 2.8rem);
  }
  h1 span{
    background:linear-gradient(90deg, #ffb454, #ff6f91);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  p.sub{
    text-align:center;
    color:#c9b8e8;
    margin-top:10px;
    margin-bottom:50px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:24px;
    max-width:1000px;
    margin:0 auto;
  }
  .card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:26px 20px;
    text-align:center;
    cursor:pointer;
    transition:transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover{
    transform:translateY(-8px) scale(1.03);
    background:rgba(255,255,255,0.1);
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
  }
  .card .icon{
    font-size:2.4rem;
    margin-bottom:12px;
  }
  .card h3{
    font-family:'Poppins', sans-serif;
    font-size:1.1rem;
    margin-bottom:6px;
  }
  .card .year{
    font-size:0.8rem;
    color:#c9b8e8;
    margin-bottom:12px;
  }
  .card .fact{
    font-size:0.82rem;
    color:#e6dcf7;
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:all 0.35s ease;
  }
  .card.active .fact{
    max-height:120px;
    opacity:1;
    margin-top:6px;
  }
  footer{
    text-align:center;
    margin-top:60px;
    color:#a893cf;
    font-size:0.85rem;
  }
</style>
</head>
<body>

<h1>Lenguajes de <span>Programación</span></h1>
<p class="sub">Toca una tarjeta para descubrir algo curioso ✨</p>

<div class="grid" id="grid"></div>

<footer>Hecho con HTML, CSS y un poco de magia 💜</footer>

<script>
const langs = [
  {name:"Python", year:1991, icon:"🐍", fact:"Fácil de leer, ideal para IA y ciencia de datos."},
  {name:"JavaScript", year:1995, icon:"⚡", fact:"El único lenguaje que corre en todos los navegadores."},
  {name:"Java", year:1995, icon:"☕", fact:"Escribe una vez, corre en cualquier lugar."},
  {name:"C++", year:1985, icon:"⚙️", fact:"Usado en videojuegos y software de alto rendimiento."},
  {name:"Ruby", year:1995, icon:"💎", fact:"Diseñado para la felicidad del programador."},
  {name:"Go", year:2009, icon:"🐹", fact:"Creado por Google para ser rápido y simple."},
  {name:"Rust", year:2010, icon:"🦀", fact:"Rápido como C, pero mucho más seguro."},
  {name:"Swift", year:2014, icon:"🍎", fact:"El lenguaje para crear apps de iPhone y Mac."},
];

const grid = document.getElementById("grid");
langs.forEach(l => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="icon">${l.icon}</div>
    <h3>${l.name}</h3>
    <div class="year">${l.year}</div>
    <div class="fact">${l.fact}</div>
  `;
  card.addEventListener("click", () => card.classList.toggle("active"));
  grid.appendChild(card);
});
</script>

</body>
</html>
