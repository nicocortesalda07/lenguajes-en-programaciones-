<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenguajes de Programación</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Nunito', sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    min-height:100vh;
    padding:50px 6vw;
  }
  h1{
    font-family:'Sora', sans-serif;
    text-align:center;
    font-size:clamp(1.7rem, 4vw, 2.5rem);
  }
  h1 span{color:#38bdf8;}
  p.sub{
    text-align:center;
    color:#94a3b8;
    margin:10px 0 40px;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .item{
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #334155;
  }
  .head{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 18px;
    cursor:pointer;
    user-select:none;
  }
  .head .icon{font-size:1.5rem;}
  .head h3{
    font-family:'Sora', sans-serif;
    font-size:1rem;
    flex:1;
  }
  .head .pop-label{
    font-size:0.75rem;
    color:#64748b;
    margin-right:10px;
  }
  .head .arrow{
    transition:transform 0.25s ease;
    color:#64748b;
  }
  .item.open .arrow{transform:rotate(180deg);}
  .bar-track{
    height:6px;
    background:#0f172a;
    margin:0 18px;
    border-radius:4px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:4px;
    width:0;
    transition:width 1s ease;
  }
  .body{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.35s ease, padding 0.35s ease;
    font-size:0.85rem;
    color:#cbd5e1;
    padding:0 18px;
  }
  .item.open .body{
    max-height:140px;
    padding:14px 18px 18px;
  }
  .body .tag{
    display:inline-block;
    background:#334155;
    color:#cbd5e1;
    font-size:0.72rem;
    padding:3px 10px;
    border-radius:999px;
    margin-top:8px;
  }
</style>
</head>
<body>

<h1>Popularidad de <span>Lenguajes</span></h1>
<p class="sub">Toca cada uno para ver su nivel de uso actual</p>

<div class="wrap" id="wrap"></div>

<script>
const langs = [
  {name:"Python", icon:"🐍", color:"#38bdf8", pop:95, tag:"IA · Datos · Automatización", fact:"El lenguaje más buscado por principiantes y expertos en datos."},
  {name:"JavaScript", icon:"⚡", color:"#facc15", pop:92, tag:"Web · Apps · Servidores", fact:"Presente en casi el 98% de los sitios web del mundo."},
  {name:"Java", icon:"☕", color:"#f97316", pop:78, tag:"Empresas · Android", fact:"Sigue siendo pilar en sistemas bancarios y apps móviles."},
  {name:"TypeScript", icon:"🔷", color:"#60a5fa", pop:74, tag:"Web tipada", fact:"JavaScript con tipos, adoptado por grandes equipos de desarrollo."},
  {name:"Go", icon:"🐹", color:"#22d3ee", pop:55, tag:"Servidores · Nube", fact:"Preferido para construir infraestructura en la nube."},
  {name:"Rust", icon:"🦀", color:"#f87171", pop:48, tag:"Sistemas seguros", fact:"El lenguaje mejor valorado por sus propios desarrolladores."},
];

const wrap = document.getElementById("wrap");
langs.forEach(l => {
  const item = document.createElement("div");
  item.className = "item";
  item.innerHTML = `
    <div class="head">
      <div class="icon">${l.icon}</div>
      <h3>${l.name}</h3>
      <div class="pop-label">${l.pop}% popularidad</div>
      <div class="arrow">▾</div>
    </div>
    <div class="bar-track"><div class="bar-fill" style="background:${l.color}"></div></div>
    <div class="body">
      <p>${l.fact}</p>
      <span class="tag">${l.tag}</span>
    </div>
  `;
  const head = item.querySelector(".head");
  const fill = item.querySelector(".bar-fill");

  head.addEventListener("click", () => {
    document.querySelectorAll(".item").forEach(i => { if(i!==item) i.classList.remove("open"); });
    item.classList.toggle("open");
  });

  wrap.appendChild(item);
  requestAnimationFrame(() => { fill.style.width = l.pop + "%"; });
});
</script>
</body>
</html>
